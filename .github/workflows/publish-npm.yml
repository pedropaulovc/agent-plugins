name: Publish npm plugins

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - ".github/workflows/publish-npm.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Test OpenCode adapters
        run: npm run test:opencode
      - name: Publish new plugin versions
        shell: bash
        run: |
          set -euo pipefail
          for manifest in plugins/*/package.json; do
            package_dir=${manifest%/package.json}
            package_name=$(node -p "require('./$manifest').name")
            package_version=$(node -p "require('./$manifest').version")
            package_spec="$package_name@$package_version"

            if npm view "$package_spec" version --json >/dev/null 2>&1; then
              echo "Already published: $package_spec"
              continue
            fi

            echo "Publishing: $package_spec"
            npm publish "$package_dir"
          done
