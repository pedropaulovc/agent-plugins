# Validates marketplace.json structure and its ↔ plugins/ directory sync.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate marketplace.json
        run: jq empty .claude-plugin/marketplace.json

  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check marketplace.json sources match plugins/ directories
        run: |
          manifest=$(jq -r '.plugins[].source' .claude-plugin/marketplace.json | sort)
          actual=$(find plugins -mindepth 1 -maxdepth 1 -type d | sed 's|^|./|' | sort)
          missing=$(comm -23 <(echo "$manifest") <(echo "$actual"))
          orphans=$(comm -13 <(echo "$manifest") <(echo "$actual"))
          fail=0
          if [[ -n "$missing" ]]; then
            echo "::error::marketplace.json references directories that don't exist:"
            echo "$missing" | sed 's/^/  /'
            fail=1
          fi
          if [[ -n "$orphans" ]]; then
            echo "::error::plugins/ contains directories not listed in marketplace.json:"
            echo "$orphans" | sed 's/^/  /'
            fail=1
          fi
          exit $fail

  check-jq-programs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compile-check embedded jq programs in PR-comment formatters
        run: bash tools/check-jq-programs.sh

  test-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install OpenCode adapter dependencies
        run: npm ci --ignore-scripts
      - name: Test OpenCode plugin adapters
        run: npm run test:opencode

      - name: Test watch-pr shell monitor
        run: npm run test:watch-pr

      - name: Test memory usage scanner and hook ranking contract
        run: npm run test:usage

      - name: Check OpenCode package versions match plugin manifests
        run: |
          fail=0
          for package in plugins/*/package.json; do
            plugin_dir=${package%/package.json}
            # Superpowers owns its upstream package version independently.
            [[ $plugin_dir == plugins/superpowers ]] && continue
            package_version=$(jq -r .version "$package")
            claude_version=$(jq -r .version "$plugin_dir/.claude-plugin/plugin.json")
            if [[ $package_version != "$claude_version" ]]; then
              echo "::error file=$package::package version $package_version does not match plugin version $claude_version"
              fail=1
            fi
            codex_manifest="$plugin_dir/.codex-plugin/plugin.json"
            if [[ -f $codex_manifest ]]; then
              codex_version=$(jq -r .version "$codex_manifest")
              if [[ $codex_version != "$claude_version" ]]; then
                echo "::error file=$codex_manifest::Codex version $codex_version does not match Claude version $claude_version"
                fail=1
              fi
            fi
          done
          exit $fail

  test-rust-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test native hook implementations
        run: cargo test -p memory-to-repo
